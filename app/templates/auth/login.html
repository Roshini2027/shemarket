{% extends "base.html" %}
{% block title %}Log In — SheMarket{% endblock %}

{% block content %}
<section class="auth-section d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-7 col-lg-5">

                <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-bag-heart-fill text-primary fs-1"></i>
                        <h2 class="fw-bold mt-2">Welcome back</h2>
                        <p class="text-secondary small">Log in to your SheMarket account</p>
                    </div>

                    <form id="loginForm" method="POST" action="{{ url_for('auth.login') }}" novalidate>
                        <!-- Email -->
                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">Email address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="bi bi-envelope text-secondary"></i>
                                </span>
                                <input type="email" id="email" name="email"
                                    class="form-control border-start-0 ps-0"
                                    placeholder="you@example.com"
                                    value="{{ email }}"
                                    required autocomplete="email">
                                <div class="invalid-feedback">Please enter a valid email address.</div>
                            </div>
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <label for="password" class="form-label fw-semibold mb-0">Password</label>
                            </div>
                            <div class="input-group mt-1">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="bi bi-lock text-secondary"></i>
                                </span>
                                <input type="password" id="password" name="password"
                                    class="form-control border-start-0 border-end-0 ps-0"
                                    placeholder="Enter your password"
                                    required autocomplete="current-password">
                                <button type="button" class="input-group-text bg-light border-start-0"
                                    id="togglePassword" title="Show/hide password">
                                    <i class="bi bi-eye text-secondary" id="toggleIcon"></i>
                                </button>
                                <div class="invalid-feedback">Password is required.</div>
                            </div>
                        </div>

                        <!-- Remember me -->
                        <div class="mb-4 form-check">
                            <input type="checkbox" class="form-check-input" id="remember" name="remember">
                            <label class="form-check-label text-secondary small" for="remember">Remember me for 30 days</label>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 fw-semibold py-2">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Log In
                        </button>
                    </form>

                    <hr class="my-4">
                    <p class="text-center text-secondary small mb-0">
                        Don't have an account?
                        <a href="{{ url_for('auth.register') }}" class="text-primary fw-semibold text-decoration-none">Sign up</a>
                    </p>
                </div>

            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
    // Show/hide password toggle
    document.getElementById("togglePassword").addEventListener("click", function () {
        const input = document.getElementById("password");
        const icon = document.getElementById("toggleIcon");
        const isHidden = input.type === "password";
        input.type = isHidden ? "text" : "password";
        icon.className = isHidden ? "bi bi-eye-slash text-secondary" : "bi bi-eye text-secondary";
    });

    // Client-side validation
    document.getElementById("loginForm").addEventListener("submit", function (e) {
        if (!this.checkValidity()) {
            e.preventDefault();
            e.stopPropagation();
        }
        this.classList.add("was-validated");
    });
</script>
{% endblock %}
